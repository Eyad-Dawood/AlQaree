<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بوابة الدخول | أكاديمية القارئ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- مكتبات الفايربيز الأساسية -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
    <div class="login-container">
      <div class="logo-section">
        <img src="resources/logo.jpeg" alt="لوجو الأكاديمية" />
      </div>
      <h1>أكاديمية القارئ</h1>
      <!-- ربط نموذج الدخول بدالة login الموجودة في ملف الجافاسكريبت -->
      <form
        id="login-form"
        onsubmit="
          event.preventDefault();
          login();
        "
      >
        <div class="form-group">
          <label>اسم مستخدم </label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input
              type="text"
              id="login-username"
              class="form-control"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="login-password"
              class="form-control"
              required
            />
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn-login">
          تسجيل الدخول
        </button>
      </form>
    </div>

    <!-- 1️⃣ استدعاء ملف الجافاسكريبت الخاص بنا هنا في الأسفل بعد تحميل تصميم الصفحة -->
    <script src="Scripts/auth-router.js"></script>

    <!-- 2️⃣ كود التحقق التلقائي إذا كان المستخدم قد سجل دخوله مسبقاً -->
    <script>
      window.onload = function () {
        if (typeof auth !== "undefined") {
          auth.onAuthStateChanged((user) => {
            // إذا كان هناك مستخدم مسجل الدخول، نقوم بتوجيهه للوحة التحكم
            if (user && localStorage.getItem("currentSupervisor")) {
              // تم التعديل هنا لاستخدام href بدلاً من replace لتجنب مشاكل المسار
              window.location.href = "dashboard.html";
            }
          });
        }
      };
    </script>
  </body>
</html>
